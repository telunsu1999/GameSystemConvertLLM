<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GameLoop Playground</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font:14px 'Microsoft YaHei',sans-serif;background:#1a1a2e;color:#eee;display:flex;flex-direction:column;height:100vh}
#top{display:flex;align-items:center;gap:10px;padding:6px 12px;background:#0d1b2a;border-bottom:2px solid #0f3460}
#top button{padding:5px 12px;border:1px solid #0f3460;border-radius:3px;background:#0f3460;color:#eee;cursor:pointer;font-size:12px}
#top button:hover{background:#1a4a8a}
#top button.sel-speed{background:#e94560;border-color:#e94560}
#top .time{font-size:17px;font-weight:bold;color:#e94560;min-width:180px}
#top .divider{width:1px;height:22px;background:#0f3460}
#llm-bar{display:flex;align-items:center;gap:8px;margin-left:auto;padding:4px 12px;border-radius:4px;font-size:12px;font-weight:bold}
#llm-bar.running{background:#0a2a1a;border:1px solid #00ff88;color:#00ff88}
#llm-bar.stopped{background:#2a0a0a;border:1px solid #ff4444;color:#ff4444}
#llm-bar.loading{background:#2a2a0a;border:1px solid #e9c445;color:#e9c445}
#llm-bar .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
#llm-bar.running .dot{background:#00ff88;animation:pulse 1.5s infinite}
#llm-bar.loading .dot{background:#e9c445;animation:spin .8s linear infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.llm-thinking{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1000;background:#0d1b2a;border:2px solid #e9c445;border-radius:8px;padding:20px 30px;text-align:center}
.llm-thinking.active{display:block}
.llm-thinking .spinner{width:30px;height:30px;border:3px solid #0f3460;border-top:3px solid #e9c445;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
.llm-thinking .msg{color:#e9c445;font-size:14px;margin-top:8px}
#main{display:flex;flex:1;overflow:hidden}
#npcs{display:flex;gap:10px;padding:10px;flex:1;overflow-y:auto}
.npc{flex:1;min-width:300px;max-width:420px;background:#16213e;border:1px solid #0f3460;border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:6px}
.npc h3{font-size:16px;margin:0;display:flex;align-items:center;gap:6px}
.npc h3 .persona{font-size:10px;color:#888;font-weight:normal}
.npc .bar{margin:0;display:flex;align-items:center;gap:5px}
.npc .bar .lbl{width:22px;font-size:10px;color:#aaa;text-align:right}
.npc .bar .fill{flex:1;height:8px;background:#0f3460;border-radius:4px;overflow:hidden}
.npc .bar .fill div{height:100%;border-radius:4px;transition:width .3s}
.npc .bar .fill .hp{background:#e94560}.npc .bar .fill .st{background:#e9c445}
.npc .info{font-size:11px;color:#aaa;display:flex;gap:10px}
.npc .info b{color:#eee}
.npc .attrs-row{font-size:9px;color:#666;padding:1px 0}
.npc .attrs-row .a-cat{color:#0f3460;background:#0a0a1a;padding:0 4px;border-radius:2px;margin-right:6px;font-size:8px}
.npc .goals-title{font-size:10px;color:#e9c445;text-transform:uppercase;letter-spacing:1px;margin-top:4px;border-bottom:1px solid #0f3460;padding-bottom:2px}
.npc .goal-section{margin:2px 0}
.npc .goal-section .gs-label{font-size:9px;color:#555;padding:1px 0;letter-spacing:1px}
.npc .goal-row{display:flex;align-items:center;gap:5px;font-size:11px;padding:1px 0}
.npc .goal-row .g-icon{font-size:12px;width:14px;text-align:center}
.npc .goal-row .g-desc{flex:1;color:#ccc}
.npc .goal-row .g-progress{font-size:10px;color:#888;min-width:40px;text-align:right}
.npc .goal-row .g-bar{width:40px;height:4px;background:#0f3460;border-radius:2px;overflow:hidden}
.npc .goal-row .g-bar div{height:100%;border-radius:2px}
.npc .goal-row.long .g-bar div{background:#e9c445}
.npc .goal-row.short .g-bar div{background:#0f3460}
.npc .goal-row .g-milestone{font-size:9px;color:#666;margin-left:19px}
.npc .goal-row.long .g-icon{color:#e9c445}
.npc .goal-row.short .g-icon{color:#0f3460}
.npc .goal-row.done .g-desc{color:#555;text-decoration:line-through}
.npc .upcoming{margin-top:4px;font-size:10px;color:#777;border-top:1px solid #0f3460;padding-top:4px}
.npc .actions{margin-top:4px;display:flex;gap:5px}
.npc .actions button{flex:1;padding:5px;border:1px solid #0f3460;border-radius:3px;background:#0f3460;color:#eee;cursor:pointer;font-size:11px}
.npc .actions button:hover{background:#1a4a8a}
.npc.thinking{border-color:#e9c445;box-shadow:0 0 12px rgba(233,196,69,.3)}
.npc .think-badge{display:none;font-size:10px;color:#e9c445;margin-left:8px;animation:pulse 1.5s infinite}
.npc.thinking .think-badge{display:inline}
.npc .think-badge .spinner-sm{display:inline-block;width:8px;height:8px;border:2px solid #0f3460;border-top:2px solid #e9c445;border-radius:50%;animation:spin .8s linear infinite;margin-right:3px;vertical-align:middle}
#right{width:420px;display:flex;flex-direction:column;background:#16213e;border-left:1px solid #0f3460}
#right .tab-bar{display:flex}
#right .tab-bar button{flex:1;padding:6px;background:#0f3460;border:none;color:#aaa;cursor:pointer;font-size:12px}
#right .tab-bar button.sel{background:#16213e;color:#eee;border-bottom:2px solid #e94560}
#right .tab{flex:1;overflow-y:auto;display:none;padding:8px;font-size:12px}
#right .tab.active{display:block}
#events .e{padding:3px 0;border-bottom:1px solid #0f3460;color:#aaa}
#events .e span{color:#00ff88;margin-right:4px}
.llm-session{border:1px solid #0f3460;border-radius:4px;margin:6px 0;padding:6px;background:#0d1b2a}
.llm-session .meta{font-size:10px;color:#888;margin-bottom:4px}
.llm-session .meta .npc{color:#e9c445;font-weight:bold}
.llm-session .prompt{font-size:11px;color:#ccc;max-height:200px;overflow-y:auto;white-space:pre-wrap;background:#1a1a2e;padding:4px;border-radius:2px;margin:4px 0}
.llm-session .response{font-size:13px;padding:4px 8px;border-radius:3px;margin:4px 0}
.llm-session .response.ok{background:#0a2a1a;color:#00ff88}
.llm-session .response.err{background:#2a0a0a;color:#ff4444}
.llm-session .response.pending{background:#2a2a0a;color:#e9c445}
.llm-session .think-box{margin:4px 0;border:1px solid #0f3460;border-radius:3px;overflow:hidden}
.llm-session .think-box .think-header{cursor:pointer;padding:3px 8px;background:#0f3460;font-size:10px;color:#aaa;display:flex;justify-content:space-between}
.llm-session .think-box .think-header:hover{background:#1a4a8a}
.llm-session .think-box .think-body{font-size:10px;color:#888;padding:4px 8px;max-height:120px;overflow-y:auto;white-space:pre-wrap;background:#1a1a2e;display:none}
.llm-session .think-box.open .think-body{display:block}
.llm-session .reply-box{padding:4px 8px;border-radius:3px;margin:4px 0;font-size:13px}
.llm-session .reply-box.ok{background:#0a2a1a;color:#00ff88}
.llm-session .reply-box.err{background:#2a0a0a;color:#ff4444}
#trace .t{margin:2px 0;padding:3px 5px;border-radius:3px;background:#0f3460}
#trace .t .step{color:#e9c445;margin-right:5px}
#trace .t .phase{color:#00ff88;margin-right:5px}
#debug{padding:8px;border-top:1px solid #0f3460;display:flex;flex-wrap:wrap;gap:5px}
#debug input,#debug select{padding:3px 5px;background:#1a1a2e;border:1px solid #0f3460;color:#eee;border-radius:3px;font-size:11px;width:65px}
#debug select{width:85px}
#debug button{padding:3px 7px;background:#0f3460;border:1px solid #0f3460;color:#eee;cursor:pointer;border-radius:3px;font-size:11px}
#debug button:hover{background:#1a4a8a}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:999;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal{background:#16213e;border:1px solid #0f3460;border-radius:8px;padding:16px;min-width:500px;max-width:700px;max-height:80vh;overflow-y:auto}
.modal h3{margin-bottom:12px;font-size:16px;color:#e94560}
.modal .close{float:right;cursor:pointer;font-size:20px;color:#aaa}
.modal .sec{margin:10px 0}
.modal .sec h4{font-size:13px;color:#e9c445;margin-bottom:4px}
.modal .sec div{font-size:12px;color:#ccc;line-height:1.6}
</style>
</head>
<body>
<div id="top">
  <div class="time" id="time">Spring D1 0:00 Tick 0</div>
  <div class="divider"></div>
  <button onclick="send({type:'tick',count:1})">+1</button>
  <button onclick="send({type:'tick',count:6})">+6</button>
  <button onclick="send({type:'tick',count:24})">+24</button>
  <button onclick="send({type:'tick',count:144})">+144</button>
  <div class="divider"></div>
  <button id="btn-auto" onclick="toggleAutoTick()" style="background:#0a2a1a;border-color:#00ff88;color:#00ff88">▶ Auto</button>
  <button id="btn-speed1" onclick="setAutoSpeed(500)" style="font-size:10px;padding:2px 6px">.5s</button>
  <button id="btn-speed2" onclick="setAutoSpeed(1000)" style="font-size:10px;padding:2px 6px">1s</button>
  <button id="btn-speed3" onclick="setAutoSpeed(2000)" class="sel-speed" style="font-size:10px;padding:2px 6px">2s</button>
  <button id="btn-speed4" onclick="setAutoSpeed(5000)" style="font-size:10px;padding:2px 6px">5s</button>
  <button id="btn-block" onclick="toggleBlock()" style="font-size:10px;padding:2px 6px;background:#2a2a0a;border-color:#e9c445;color:#e9c445">□ Block</button>
  <div class="divider"></div>
  <div id="llm-bar" class="stopped">
    <span class="dot"></span>
    <span id="llm-text">LLM: Stopped</span>
    <button onclick="send({type:'start_llm'})" style="font-size:10px;padding:2px 8px">Start</button>
    <button onclick="send({type:'stop_llm'})" style="font-size:10px;padding:2px 8px">Stop</button>
    <button onclick="send({type:'toggle_llm'})" style="font-size:10px;padding:2px 8px">Toggle</button>
  </div>
</div>
<div class="llm-thinking" id="thinking">
  <div class="spinner"></div>
  <div id="thinking-npc"></div>
  <div class="msg">LLM thinking...</div>
</div>
<div id="main">
  <div id="npcs"></div>
  <div id="right">
    <div class="tab-bar">
      <button class="sel" onclick="switchTab('events', this)">Events</button>
      <button onclick="switchTab('llm-sessions', this)">LLM</button>
      <button onclick="switchTab('trace', this)">Trace</button>
    </div>
    <div class="tab active" id="tab-events"><div id="events"></div></div>
    <div class="tab" id="tab-llm-sessions"><div id="sessions"></div></div>
    <div class="tab" id="tab-trace"><div id="trace"></div></div>
    <div id="debug">
      <select id="dbNpc"><option value="blacksmith">布洛克</option><option value="merchant">老雷</option><option value="guard">铁卫</option></select>
      <input id="dbField" placeholder="field" value="hp">
      <input id="dbValue" placeholder="value" value="50">
      <button onclick="debugSetAttr()">SetAttr</button>
      <input id="evType" placeholder="type" value="death" style="width:50px">
      <input id="evTags" placeholder="tags" value="mine">
      <button onclick="debugAddEvent()">AddEvent</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="semModal"><div class="modal"><span class="close" onclick="closeModal()">&times;</span><div id="semContent"></div></div></div>

<script>
let ws,lid=0;
function connect(){
  ws=new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage=e=>{
    const m=JSON.parse(e.data);
    if(m.type==='state') renderState(m)
    else if(m.type==='event') addEvent(m.tick,m.text)
    else if(m.type==='trace') addTrace(m.step,m.phase,m.detail)
    else if(m.type==='semantic') showSemanticModal(m)
    else if(m.type==='llm_status') updateLlmBar(m)
    else if(m.type==='auto_tick_state') updateAutoTickUI(m)
    else if(m.type==='llm_thinking'){lid=m.sessionId;showThinking(m.npcId)}
    else if(m.type==='llm_done'){hideThinking();addSession(m);updateUpcoming(m)}
    else if(m.type==='attr_changed') onAttrChanged(m)
    else if(m.type==='goals_updated') onGoalsUpdated(m)
  };
  ws.onclose=()=>setTimeout(connect,2000);
}
connect();

function send(obj){if(ws&&ws.readyState===1)ws.send(JSON.stringify(obj))}

function updateLlmBar(m){
  let bar=document.getElementById('llm-bar');
  bar.className=m.running?'running':'stopped';
  let t=m.running?(m.online?'LLM: Online':'LLM: Starting...'):'LLM: Stopped';
  document.getElementById('llm-text').textContent=t;
}

// Auto-tick state
let autoRunning=false, autoInterval=2000, autoBlock=false;
function updateAutoTickUI(m){
  autoRunning=m.running; autoInterval=m.interval; autoBlock=m.blockOnThinking;
  let btn=document.getElementById('btn-auto');
  btn.textContent=autoRunning?'⏸ Pause':'▶ Auto';
  btn.style.background=autoRunning?'#2a0a0a':'#0a2a1a';
  btn.style.borderColor=autoRunning?'#ff4444':'#00ff88';
  btn.style.color=autoRunning?'#ff4444':'#00ff88';
  // Highlight active speed
  document.querySelectorAll('#top button[id^=btn-speed]').forEach(b=>b.classList.remove('sel-speed'));
  let speedBtn=document.getElementById('btn-speed'+
    (autoInterval<=500?1:autoInterval<=1000?2:autoInterval<=2000?3:4));
  if(speedBtn)speedBtn.classList.add('sel-speed');
  // Block toggle
  let bb=document.getElementById('btn-block');
  bb.textContent=autoBlock?'☑ Block':'☐ Block';
  bb.style.background=autoBlock?'#e9c445':'#2a2a0a';
  bb.style.color=autoBlock?'#1a1a2e':'#e9c445';
}
function toggleAutoTick(){
  if(autoRunning) send({type:'auto_tick',action:'stop'});
  else send({type:'auto_tick',action:'start',interval:autoInterval,blockOnThinking:autoBlock});
}
function setAutoSpeed(ms){
  autoInterval=ms;
  if(autoRunning) send({type:'auto_tick',action:'set_interval',interval:ms});
}
function toggleBlock(){
  autoBlock=!autoBlock;
  if(autoRunning) send({type:'auto_tick',action:'set_block',blockOnThinking:autoBlock});
  else updateAutoTickUI({running:false,interval:autoInterval,blockOnThinking:autoBlock});
}

function onGoalsUpdated(m){
  let card=document.querySelector(`.npc[data-id="${m.npcId}"]`);
  if(!card||!m.goals) return;
  // Re-render goals section only
  let goalsDiv=card.querySelector('.goals-title');
  if(!goalsDiv) return;
  // Remove old goal content after the title
  let next=goalsDiv.nextSibling;
  while(next&&!next.classList?.contains('upcoming')&&next.tagName!=='BUTTON'){
    let t=next.nextSibling; next.remove(); next=t;
  }
  // Build new goal HTML
  let n={goals:m.goals};
  let html='';
  if(n.goals&&n.goals.length){
    let long=n.goals.filter(g=>g.type==='long'&&!g.completed);
    let short=n.goals.filter(g=>g.type==='short'&&!g.completed);
    let done=n.goals.filter(g=>g.completed);
    function renderGoal(g){
      let icon=g.type==='long'?'★':'·';
      let cls=g.type==='long'?'long':'short';
      let mile=g.milestone?`<div class="g-milestone">→ ${g.milestone}</div>`:'';
      return `<div class="goal-row ${cls}">
        <span class="g-icon">${icon}</span><span class="g-desc">${g.desc}</span>
        <span class="g-progress">${g.progress}%</span>
        <div class="g-bar"><div style="width:${g.progress}%"></div></div>
      </div>${mile}`;
    }
    if(long.length) html+='<div class="goal-section"><div class="gs-label">▸ 长期目标</div>'+long.map(renderGoal).join('')+'</div>';
    if(short.length) html+='<div class="goal-section"><div class="gs-label">▸ 短期目标</div>'+short.map(renderGoal).join('')+'</div>';
    if(done.length) html+='<div class="goal-section"><div class="gs-label">▸ 已完成</div>'+done.map(renderGoal).join('')+'</div>';
  }
  goalsDiv.insertAdjacentHTML('afterend', html);
}

function showThinking(npcId){
  document.getElementById('thinking').classList.add('active');
  document.getElementById('thinking-npc').textContent=npcId||'';
}
function hideThinking(){
  document.getElementById('thinking').classList.remove('active');
}
function updateUpcoming(m){
  if(!m.upcoming||!m.npcId) return;
  let card=document.querySelector(`.npc[data-id="${m.npcId}"]`);
  if(!card) return;
  let upDiv=card.querySelector('.upcoming');
  if(upDiv) upDiv.innerHTML=m.upcoming.map(u=>`T${u.tick} ${u.action}${u.detail?' '+u.detail:''}`).join('<br>');
}

// Real-time attribute change handling
function onAttrChanged(m){
  if(m.key==='llm_thinking'){
    let card=document.querySelector(`.npc[data-id="${m.entityId}"]`);
    if(!card) return;
    if(m.value===1||m.value==='1'){
      card.classList.add('thinking');
    }else{
      card.classList.remove('thinking');
    }
  } else if(m.key==='location'||m.key==='current_action'){
    // location/action change: update NPC card info line
    let card=document.querySelector(`.npc[data-id="${m.entityId}"]`);
    if(card){
      let info=card.querySelector('.info');
      if(info) info.innerHTML=buildInfoLine(m.entityId);
    }
  }
}

function buildInfoLine(id){
  // Fetch latest attrs from last state -- for real-time we use DOM
  return '';
}

function renderAttrs(n){
  if(!n.allAttrs) return '<div class="attrs-row"></div>';
  // Tag categories for display
  const basicTags=['vital','hp','world','travel'];
  const itemTags=['daily','trade','currency'];
  const ignore=['identity','meta','combat'];
  let basic=[], items=[], special=[];
  for(let [k,a] of Object.entries(n.allAttrs)){
    if(!a||!a.t) continue;
    let tags=a.t||[], v=a.v;
    if(tags.some(t=>ignore.includes(t))) continue;
    if(tags.some(t=>basicTags.includes(t))){
      let label=k.replace(/_/g,' ');
      if(k==='location') label='📍位置'; else if(k==='hp') label='❤️生命';
      else if(k==='hp_max') { basic.push(`上限${v}`); continue; }
      else if(k==='stamina') label='⚡体力'; else if(k==='stamina_max') continue;
      else if(k==='moving'&&v==0) continue;
      basic.push(`${label}:${v}`);
    }else if(tags.some(t=>itemTags.includes(t))){
      let icon=k.includes('food')?'🍖':k.includes('iron')?'⚒':k.includes('gold')?'💰':'📦';
      items.push(`${icon}${v}`);
    }else{
      let label=k.replace(/_/g,' ');
      if(v!==0&&v!=='0'&&v!=='') special.push(`${label}:${v}`);
    }
  }
  let h='';
  if(basic.length) h+=`<div class="attrs-row"><span class="a-cat">基础</span>${basic.join(' | ')}</div>`;
  if(items.length) h+=`<div class="attrs-row"><span class="a-cat">道具</span>${items.join(' ')}</div>`;
  if(special.length) h+=`<div class="attrs-row"><span class="a-cat">特殊</span>${special.join(' | ')}</div>`;
  return h||'<div class="attrs-row"></div>';
}

let sessions=[];
function addSession(m){
  sessions.push(m);
  renderSessions();
}
function renderSessions(){
  let h='';
  for(let s of sessions.slice(-20).reverse()){
    let cls=s.error?'err':s.latency?'ok':'pending';
    let meta=s.npcId+' @ T'+s.tick+(s.latency?` (${s.latency}ms)`:s.error?' (FAIL)':'');
    // Split thinking and reply
    let think='', reply=s.error?s.error:(s.response||'waiting...');
    if(!s.error&&s.response){
      let m=s.response.match(/<think>([\s\S]*?)<\/think>/);
      if(m){ think=m[1].trim(); reply=s.response.replace(/<think>[\s\S]*?<\/think>/,'').trim(); }
    }
    let thinkHtml='';
    if(think){
      let sid='think-'+sessions.indexOf(s);
      thinkHtml=`<div class="think-box" id="${sid}">
        <div class="think-header" onclick="document.getElementById('${sid}').classList.toggle('open')">
          <span>💭 思考过程</span><span style="font-size:9px">点击展开</span>
        </div>
        <div class="think-body">${think}</div>
      </div>`;
    }
    h+=`<div class="llm-session">
      <div class="meta"><span class="npc">${meta}</span></div>
      <div class="prompt">${s.prompt||''}</div>
      ${thinkHtml}
      <div class="reply-box ${cls}">${reply}</div>
    </div>`;
  }
  document.getElementById('sessions').innerHTML=h||'No LLM sessions yet';
}

function renderState(s){
  document.getElementById('time').textContent=`${s.season} D${s.day} ${s.timeBlock} H${s.hour} Tick ${s.tick}`;
  let h='';
  for(const[id,n]of Object.entries(s.npcs||{})){
    let hpPct=Math.max(0,n.hp/n.hpMax*100),stPct=n.stamina/100*100;
    let status=n.dead?'DEAD':n.moving?'MOVING':'idle';
    let thinking=n.llmThinking;
    let up=n.upcoming.map(u=>`T${u.tick} ${u.action}${u.detail?' '+u.detail:''}`).join(' &nbsp;');
    // Goals
    let goalsHtml='';
    if(n.goals&&n.goals.length){
      // Split by type
      let long=n.goals.filter(g=>g.type==='long'&&!g.completed);
      let short=n.goals.filter(g=>g.type==='short'&&!g.completed);
      let done=n.goals.filter(g=>g.completed);
      if(long.length||short.length||done.length){
        goalsHtml='<div class="goals-title">🎯 目标</div>';
        function renderGoal(g){
          let icon=g.type==='long'?'★':'·';
          let cls=g.type==='long'?'long':'short';
          let mile=g.milestone?`<div class="g-milestone">→ ${g.milestone}</div>`:'';
          return `<div class="goal-row ${cls}">
            <span class="g-icon">${icon}</span><span class="g-desc">${g.desc}</span>
            <span class="g-progress">${g.progress}%</span>
            <div class="g-bar"><div style="width:${g.progress}%"></div></div>
          </div>${mile}`;
        }
        if(long.length) goalsHtml+='<div class="goal-section"><div class="gs-label">▸ 长期目标</div>'+long.map(renderGoal).join('')+'</div>';
        if(short.length) goalsHtml+='<div class="goal-section"><div class="gs-label">▸ 短期目标</div>'+short.map(renderGoal).join('')+'</div>';
        if(done.length) goalsHtml+='<div class="goal-section"><div class="gs-label">▸ 已完成</div>'+done.map(renderGoal).join('')+'</div>';
      }
    }
    h+=`<div class="npc${thinking?' thinking':''}" data-id="${id}">
      <h3>${n.name||id}<span class="think-badge"><span class="spinner-sm"></span>thinking</span><span class="persona">${n.personality||''}</span></h3>
      <div class="bar"><div class="lbl">HP</div><div class="fill"><div class="hp" style="width:${hpPct}%"></div></div><span style="font-size:10px">${n.hp}/${n.hpMax}</span></div>
      <div class="bar"><div class="lbl">SP</div><div class="fill"><div class="st" style="width:${stPct}%"></div></div><span style="font-size:10px">${n.stamina}</span></div>
      <div class="info"><span>💰<b>${n.gold}</b></span> <span>📍<b>${n.location}</b></span> <span>${status}</span> <span style="color:#e94560">${n.currentAction}</span></div>
      ${renderAttrs(n)}
      ${goalsHtml}
      <div class="upcoming">📋 ${up||'暂无日程'}</div>
      <div class="actions">
        <button onclick="send({type:'interact',npcId:'${id}'})">🤝 Interact</button>
      </div>
    </div>`;
  }
  document.getElementById('npcs').innerHTML=h;
}

let eventCount=0;
function addEvent(tick,text){
  let el=document.getElementById('events');
  el.innerHTML+=`<div class="e"><span>[T${tick}]</span>${text}</div>`;
  if(++eventCount>300) el.firstChild.remove();
  el.scrollTop=el.scrollHeight;
}

function addTrace(step,phase,detail){
  let el=document.getElementById('trace');
  let ph=phase=='trigger'?'Trigger':phase=='collect'?'Collect':phase=='prompt'?'Prompt':phase=='llm'?'LLM':phase=='resolve'?'Resolve':phase;
  let cl=phase=='llm'&&detail.includes('waiting')?' style="color:#e9c445"':phase=='llm'&&detail.includes('failed')?' style="color:#ff4444"':'';
  el.innerHTML+=`<div class="t"${cl}><span class="step">[${step}]</span><span class="phase">${ph}</span>${detail}</div>`;
  el.scrollTop=el.scrollHeight;
  // Auto switch to Trace tab when traces come in
  let tt=document.getElementById('tab-trace');
  if(tt&&!tt.classList.contains('active')) switchTab('trace');
}

function switchTab(name, btn){
  document.querySelectorAll('#right .tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('#right .tab-bar button').forEach(b=>b.classList.remove('sel'));
  let tab = document.getElementById('tab-'+name);
  if(tab) tab.classList.add('active');
  if(btn) btn.classList.add('sel');
}

function showSemanticModal(m){
  let texts=m.texts?Object.entries(m.texts).map(([k,v])=>k+': '+v).join('<br>'):'none';
  let up=(m.upcoming||[]).map(u=>`T${u.tick}: ${u.action} ${u.desc}`).join('<br>')||'none';
  let raw=m.rawAttrs?Object.entries(m.rawAttrs).map(([k,v])=>k+'='+v).join(', '):'';
  document.getElementById('semContent').innerHTML=`
    <h3>${m.npcId}</h3>
    <div class="sec"><h4>Semantic</h4><div>${texts}</div></div>
    <div class="sec"><h4>Schedule</h4><div>${up}</div></div>
    <div class="sec"><h4>Current</h4><div>${m.current||'idle'}</div></div>
    <div class="sec"><h4>Raw</h4><div>${raw}</div></div>`;
  document.getElementById('semModal').classList.add('active');
}
function closeModal(){document.getElementById('semModal').classList.remove('active')}

function debugSetAttr(){
  send({type:'set_attr',npcId:document.getElementById('dbNpc').value,
    field:document.getElementById('dbField').value,
    value:parseInt(document.getElementById('dbValue').value)||document.getElementById('dbValue').value});
}
function debugAddEvent(){
  send({type:'add_event',eventType:document.getElementById('evType').value,
    tags:document.getElementById('evTags').value.split(','),
    data:{who:document.getElementById('evType').value=='death'?'miner':'?'},
    perceive:document.getElementById('dbNpc').value});
}
</script>
