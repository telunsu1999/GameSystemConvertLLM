schema: spec-driven

# Project context for OpenSpec
context: |
  GameSystemConvertLLM is a game simulation system where NPCs are driven by LLM (Qwen3.5-4B).
  C# .NET backend with component-based entity system, Python LLM inference server.
  Web frontend with Canvas map display and WebSocket real-time communication.
  All game logic is JSON-configurable — no hardcoded behavior.
