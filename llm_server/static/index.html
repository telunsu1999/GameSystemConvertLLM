<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QWEN3-0.6B Test Console</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --text: #e0e0e0;
    --text-dim: #888;
    --border: #2a2a4a;
    --success: #4ade80;
    --warn: #fbbf24;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--surface);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background .3s;
  }
  .status-dot.online { background: var(--success); }
  .status-dot.offline { background: var(--accent); }

  .container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  .sidebar {
    width: 260px;
    background: var(--surface);
    padding: 16px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 16px;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .sidebar h3 {
    font-size: 13px;
    text-transform: uppercase;
    color: var(--text-dim);
    letter-spacing: 1px;
  }
  .param-group { display: flex; flex-direction: column; gap: 6px; }
  .param-group label {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
  }
  .param-group label span { color: var(--text); }
  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
  }
  .param-group input[type="number"] {
    width: 100%;
    padding: 6px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    font-size: 13px;
  }
  .btn {
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: opacity .2s;
  }
  .btn:hover { opacity: .85; }
  .btn-clear {
    background: var(--surface2);
    color: var(--text-dim);
    width: 100%;
  }
  .btn-clear:hover { color: var(--text); }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .message {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .message.user {
    align-self: flex-end;
    background: var(--accent);
    border-bottom-right-radius: 4px;
  }
  .message.assistant {
    align-self: flex-start;
    background: var(--surface);
    border-bottom-left-radius: 4px;
  }
  .message .meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 6px;
    text-align: right;
  }
  .typing {
    align-self: flex-start;
    color: var(--text-dim);
    font-size: 13px;
    padding: 12px 16px;
    display: flex;
    gap: 4px;
  }
  .typing span {
    width: 6px; height: 6px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }
  .input-area {
    padding: 16px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    flex-shrink: 0;
  }
  .input-area textarea {
    flex: 1;
    resize: none;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    min-height: 44px;
    max-height: 120px;
  }
  .input-area textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .btn-send {
    background: var(--accent);
    color: white;
    padding: 10px 24px;
    align-self: flex-end;
  }
  .btn-send:disabled {
    opacity: .4;
    cursor: not-allowed;
  }
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    gap: 8px;
  }
  .empty-state .icon { font-size: 48px; opacity: .3; }
</style>
</head>
<body>

<header>
  <h1>QWEN3-0.6B Test Console</h1>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Checking...</span>
    <span style="margin-left:16px;font-size:12px;color:var(--text-dim)" id="modelInfo"></span>
  </div>
</header>

<div class="container">
  <aside class="sidebar">
    <h3>Parameters</h3>
    <div class="param-group">
      <label>Max Tokens <span id="maxTokensVal">256</span></label>
      <input type="range" id="maxTokens" min="16" max="1024" value="256" step="16">
    </div>
    <div class="param-group">
      <label>Temperature <span id="tempVal">0.7</span></label>
      <input type="range" id="temperature" min="0" max="2" value="0.7" step="0.05">
    </div>
    <div class="param-group">
      <label>Top-P <span id="topPVal">0.9</span></label>
      <input type="range" id="topP" min="0" max="1" value="0.9" step="0.05">
    </div>
    <button class="btn btn-clear" onclick="clearChat()">Clear Chat</button>
  </aside>

  <div class="main">
    <div class="chat-area" id="chatArea">
      <div class="empty-state">
        <div class="icon">+</div>
        <div>Type a prompt and press Enter</div>
      </div>
    </div>
    <div class="input-area">
      <textarea id="promptInput" placeholder="Enter your prompt..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendPrompt();}"></textarea>
      <button class="btn btn-send" id="sendBtn" onclick="sendPrompt()">Send</button>
    </div>
  </div>
</div>

<script>
const API = 'http://127.0.0.1:8000';
const chatArea = document.getElementById('chatArea');
const promptInput = document.getElementById('promptInput');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const modelInfo = document.getElementById('modelInfo');

// Parameter controls
const maxTokensSlider = document.getElementById('maxTokens');
const tempSlider = document.getElementById('temperature');
const topPSlider = document.getElementById('topP');

maxTokensSlider.oninput = () => document.getElementById('maxTokensVal').textContent = maxTokensSlider.value;
tempSlider.oninput = () => document.getElementById('tempVal').textContent = tempSlider.value;
topPSlider.oninput = () => document.getElementById('topPVal').textContent = topPSlider.value;

// Check server health on load
async function checkHealth() {
  try {
    const r = await fetch(API + '/health');
    const data = await r.json();
    if (data.model_loaded) {
      statusDot.className = 'status-dot online';
      statusText.textContent = 'Online';
    }
    // Get model info
    try {
      const r2 = await fetch(API + '/api/v1/model/info');
      const info = await r2.json();
      modelInfo.textContent = info.name + ' @ ' + info.device;
    } catch(e) {}
  } catch(e) {
    statusDot.className = 'status-dot offline';
    statusText.textContent = 'Offline';
    modelInfo.textContent = 'Cannot reach server';
  }
}
checkHealth();
setInterval(checkHealth, 15000);

function clearChat() {
  chatArea.innerHTML = '' +
    '<div class="empty-state">' +
      '<div class="icon">+</div>' +
      '<div>Type a prompt and press Enter</div>' +
    '</div>';
}

function addMessage(role, text, meta) {
  // Remove empty state
  const es = chatArea.querySelector('.empty-state');
  if (es) es.remove();

  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.textContent = text;
  if (meta) {
    const m = document.createElement('div');
    m.className = 'meta';
    m.textContent = meta;
    div.appendChild(m);
  }
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  const es = chatArea.querySelector('.empty-state');
  if (es) es.remove();

  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function sendPrompt() {
  const prompt = promptInput.value.trim();
  if (!prompt) return;

  // Disable input
  promptInput.disabled = true;
  sendBtn.disabled = true;
  addMessage('user', prompt);

  promptInput.value = '';
  showTyping();

  const t0 = performance.now();
  try {
    const r = await fetch(API + '/api/v1/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt: prompt,
        max_tokens: parseInt(maxTokensSlider.value),
        temperature: parseFloat(tempSlider.value),
        top_p: parseFloat(topPSlider.value),
      }),
    });

    hideTyping();

    if (!r.ok) {
      const err = await r.json();
      addMessage('assistant', '[Error] ' + (err.detail || r.statusText));
    } else {
      const data = await r.json();
      const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
      addMessage('assistant', data.text, data.tokens_used + ' tokens ' + elapsed + 's');
    }
  } catch(e) {
    hideTyping();
    addMessage('assistant', '[Error] Cannot reach server. Is it running?');
  }

  promptInput.disabled = false;
  sendBtn.disabled = false;
  promptInput.focus();
}
</script>
</body>
</html>
